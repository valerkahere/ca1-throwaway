<form class="d-flex flex-column gap-3" #movieForm="ngForm"
    (ngSubmit)="movieForm.valid && movieApiService.getMovies(moviename.value)">
    <div class="form-floating">
        <!-- 'ngModel' is required for the form to track this input's validity -->
        <input ngModel #moviename type="text" class="form-control" id="movieName" name="movieName" required
            placeholder="James Bond">
        <label for="movieName">Movie Name <span class="text-danger">*</span></label>
    </div>
    <div class="d-flex justify-content-between align-items-center gap-3">
        <button type="submit" class="btn btn-primary" [disabled]="movieForm.invalid">Get Movie
            Details</button>

        
    </div>

</form>
